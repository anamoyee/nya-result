repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        stages: [pre-commit]
        types: [python]
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
